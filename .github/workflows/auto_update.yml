name: Auto-Update Strides & Sync Scores

on:
  schedule:
    # Runs at 12:00 UTC (8:00 PM Singapore SGT time) everyday
    - cron: '0 12 * * *'
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  update-scores:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests openpyxl bs4 mistune pillow

      - name: Run Auto-Scrape & Compile Script
        env:
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
        run: |
          python scripts/auto_update.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update scores [skip ci]" && git push)
