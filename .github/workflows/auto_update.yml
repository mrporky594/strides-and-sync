name: Auto-Update Strides & Sync Scores

on:
  schedule:
    - cron: '0 2 * * *' # Runs daily at 2:00 AM UTC
  workflow_dispatch:

# Prevents multiple runs from overlapping if one gets stuck
concurrency:
  group: auto-update-scores
  cancel-in-progress: false

jobs:
  update-scores:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # Automatically caches pip dependencies for faster runs

      - name: Install System Dependencies (Tesseract & Poppler for OCR)
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr tesseract-ocr-eng poppler-utils

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Install Playwright browsers and OS dependencies
          playwright install --with-deps chromium

      - name: Run Auto-Scrape & Compile Script
        id: run_script
        env:
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
        run: |
          set -e
          python scripts/auto_update.py
        continue-on-error: true # Allows the workflow to proceed to the notification step

      - name: Upload Artifacts on Failure
        if: steps.run_script.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: failure-debug-data
          path: |
            logs/
            *.log
            output/
          retention-days: 7
          if-no-files-found: ignore

      - name: Notify on Failure (Webhook)
        if: steps.run_script.outcome == 'failure'
        run: |
          curl -H "Content-Type: application/json" \
               -d '{"content": "⚠️ **Auto-Update Workflow Failed**\nRepo: ${{ github.repository }}\nCheck logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}' \
               ${{ secrets.WEBHOOK_URL }}
        continue-on-error: true # Don't fail the job just because the notification failed

      - name: Fail job if script failed
        if: steps.run_script.outcome == 'failure'
        run: exit 1

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update scores [skip ci]"
            git push
          fi
